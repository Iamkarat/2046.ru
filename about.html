<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - 2046.moscow</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }
        
        /* GIF НА ВЕСЬ ЭКРАН */
        .gif-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }
        
        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        /* БОКОВАЯ ПАНЕЛЬ */
        .side-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 100px 30px 30px 30px;
            transition: right 0.5s ease;
            overflow-y: auto;
        }
        
        .side-panel.active {
            right: 0;
        }
        
        .side-panel img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 20px;
        }
        
        .side-panel h2 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
        .side-panel p {
            font-size: 1rem;
            line-height: 1.6;
            color: #666;
            margin-bottom: 15px;
        }
        
        /* Кнопка открыть панель */
        .toggle-panel {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 200;
            transition: all 0.3s;
        }
        
        .toggle-panel:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateY(-50%) translateX(-5px);
        }
        
        /* Навигация сверху */
        .nav-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .nav-top a {
            color: #000;
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }
        
        .nav-top a:hover {
            opacity: 0.6;
        }
        
        .site-title {
            font-weight: bold;
            font-size: 16px;
        }
        
        .back-link {
            color: #000;
            font-size: 12px;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .side-panel {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>

    <!-- GIF НА ВЕСЬ ЭКРАН -->
    <div class="gif-container">
        <img src="images/about-background.gif" alt="Background Animation">
    </div>

    <!-- БОКОВАЯ ПАНЕЛЬ -->
    <div class="side-panel" id="sidePanel">
        <h2>О проекте 2046</h2>
        <p>Здесь будет информация о проекте, концепции и философии.</p>
        <p>Можно добавить описание концепт-стора, студии, направления работы.</p>
        <p>Контактная информация и детали.</p>
    </div>

    <!-- КНОПКА ОТКРЫТЬ ПАНЕЛЬ -->
    <button class="toggle-panel" onclick="togglePanel()">About →</button>

    <!-- Навигация сверху -->
    <nav class="nav-top">
        <div class="nav-left">
            <a href="index.html" class="site-title">2046</a>
            <a href="index.html" class="back-link">← Home</a>
        </div>
    </nav>

    <script>
        function togglePanel() {
            const panel = document.getElementById('sidePanel');
            panel.classList.toggle('active');
        }
    </script>

</body>
</html>
