    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            overflow-x: hidden;
        }

        /* Навигация сверху */
        .nav-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-top a {
            color: #000;
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        .nav-top a:hover {
            opacity: 0.6;
        }

        .site-title {
            font-weight: bold;
            font-size: 16px;
        }

        .back-link {
            color: #000;
            font-size: 12px;
            font-weight: 500;
        }

        /* HERO — первое фото */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            margin-top: 0;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 60px 40px 50px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
        }

        .hero-name {
            color: #fff;
            font-size: clamp(36px, 6vw, 80px);
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
            text-transform: uppercase;
        }

        /* ГАЛЕРЕЯ */
        .gallery-section {
            padding: 16px;
            background: #0a0a0a;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 6px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: #1a1a1a;
            aspect-ratio: 3 / 4;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease, opacity 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.04);
            opacity: 0.85;
        }

        .gallery-item .num {
            position: absolute;
            bottom: 8px;
            right: 10px;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* ЛАЙТБОКС */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 88vh;
            object-fit: contain;
            border: none;
            user-select: none;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 28px;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
            background: none;
            border: none;
        }

        .lightbox-close:hover { opacity: 1; }

        .lightbox-prev,
        .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            padding: 16px 20px;
            opacity: 0.6;
            transition: opacity 0.2s;
            background: none;
            border: none;
            user-select: none;
        }

        .lightbox-prev:hover,
        .lightbox-next:hover { opacity: 1; }

        .lightbox-prev { left: 12px; }
        .lightbox-next { right: 12px; }

        .lightbox-counter {
            position: absolute;
            bottom: 16px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            letter-spacing: 1px;
        }
    </style>

        let current = 0;
        const lightbox = document.getElementById('lightbox');
        const lbImg    = document.getElementById('lb-img');
        const lbCount  = document.getElementById('lb-counter');

        function open(idx) {
            current = idx;
            lbImg.src = srcs[current];
            lbCount.textContent = (current + 2) + ' / 52';
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function close() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            lbImg.src = '';
        }

        function prev() {
            current = (current - 1 + srcs.length) % srcs.length;
            lbImg.src = srcs[current];
            lbCount.textContent = (current + 2) + ' / 52';
        }

        function next() {
            current = (current + 1) % srcs.length;
            lbImg.src = srcs[current];
            lbCount.textContent = (current + 2) + ' / 52';
        }

        document.querySelectorAll('.gallery-item').forEach(el => {
            el.addEventListener('click', () => open(+el.dataset.index));
        });

        document.getElementById('lb-close').addEventListener('click', close);
        document.getElementById('lb-prev').addEventListener('click', prev);
        document.getElementById('lb-next').addEventListener('click', next);

        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) close();
        });

        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape')      close();
            if (e.key === 'ArrowLeft')   prev();
            if (e.key === 'ArrowRight')  next();
        });
    </script>
